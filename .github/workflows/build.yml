name: Build and Release

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.1.0-alpha-$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"
          fi

  gate:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Inject version
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"${{ needs.version.outputs.version }}\"/" src/general_ludd/__init__.py
          sed -i "s/^version = \".*\"/version = \"${{ needs.version.outputs.version }}\"/" pyproject.toml
      - name: Gate
        run: |
          uv sync --python ${{ matrix.python-version }}
          make lint typecheck test-count test smoke
        env:
          GLUDD_PSK: ""

  molecule:
    needs: [version, gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Run all molecule scenarios
        # The `default` (localhost) driver needs no container, so this runs on
        # plain GH runners. Each scenario starts its own stdlib mock daemon via
        # prepare.yml — nothing external is required.
        run: |
          uv sync
          make molecule-test-all
        env:
          GLUDD_PSK: ""

  linux:
    needs: [version, gate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Inject version
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" src/general_ludd/__init__.py
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
      - name: Build executable
        run: |
          uv sync
          uv run pyinstaller gludd.spec --clean --noconfirm
      - name: Package tarball
        run: |
          mkdir -p dist/release
          cp dist/gludd dist/release/gludd
          cp -r config dist/release/config
          cp -r templates dist/release/templates
          cp -r playbooks dist/release/playbooks
          cd dist/release
          tar czf "../gludd-${VERSION}-linux-x86_64.tar.gz" .
          sha256sum "../gludd-${VERSION}-linux-x86_64.tar.gz" > "../gludd-${VERSION}-linux-x86_64.tar.gz.sha256"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: gludd-linux-x86_64
          path: |
            dist/gludd-${{ env.VERSION }}-linux-x86_64.tar.gz
            dist/gludd-${{ env.VERSION }}-linux-x86_64.tar.gz.sha256

  macos:
    needs: [version, gate]
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Inject version
        run: |
          sed -i "" "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" src/general_ludd/__init__.py
          sed -i "" "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
      - name: Build executable
        run: |
          uv sync
          uv run pyinstaller gludd.spec --clean --noconfirm
      - name: Package tarball
        run: |
          mkdir -p dist/release
          cp dist/gludd dist/release/gludd
          cp -r config dist/release/config
          cp -r templates dist/release/templates
          cp -r playbooks dist/release/playbooks
          cd dist/release
          tar czf "../gludd-${VERSION}-macos-arm64.tar.gz" .
          shasum -a 256 "../gludd-${VERSION}-macos-arm64.tar.gz" > "../gludd-${VERSION}-macos-arm64.tar.gz.sha256"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: gludd-macos-arm64
          path: |
            dist/gludd-${{ env.VERSION }}-macos-arm64.tar.gz
            dist/gludd-${{ env.VERSION }}-macos-arm64.tar.gz.sha256

  windows:
    needs: [version, gate]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Inject version
        shell: pwsh
        run: |
          (Get-Content src/general_ludd/__init__.py) -replace '__version__ = ".*"', "__version__ = ""$env:VERSION""" | Set-Content src/general_ludd/__init__.py
          (Get-Content pyproject.toml) -replace '^version = ".*"', "version = ""$env:VERSION""" | Set-Content pyproject.toml
      - name: Build executable
        run: |
          uv sync
          uv run pyinstaller gludd.spec --clean --noconfirm
      - name: Package zip
        shell: pwsh
        run: |
          mkdir -p dist/release
          Copy-Item dist/gludd.exe dist/release/gludd.exe
          Copy-Item -r config dist/release/config
          Copy-Item -r templates dist/release/templates
          Copy-Item -r playbooks dist/release/playbooks
          Compress-Archive -Path dist/release/* -DestinationPath "dist/gludd-$env:VERSION-windows-x86_64.zip"
          certutil -hashfile "dist/gludd-$env:VERSION-windows-x86_64.zip" SHA256 > "dist/gludd-$env:VERSION-windows-x86_64.zip.sha256"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: gludd-windows-x86_64
          path: |
            dist/gludd-${{ env.VERSION }}-windows-x86_64.zip
            dist/gludd-${{ env.VERSION }}-windows-x86_64.zip.sha256

  termux:
    needs: [version, gate]
    runs-on: ubuntu-24.04-arm
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Inject version
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" src/general_ludd/__init__.py
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
      - name: Build executable
        run: |
          uv sync
          uv run pyinstaller gludd.spec --clean --noconfirm
      - name: Package tarball
        run: |
          mkdir -p dist/release
          cp dist/gludd dist/release/gludd
          cp -r config dist/release/config
          cp -r templates dist/release/templates
          cp -r playbooks dist/release/playbooks
          cd dist/release
          tar czf "../gludd-${VERSION}-linux-aarch64.tar.gz" .
          sha256sum "../gludd-${VERSION}-linux-aarch64.tar.gz" > "../gludd-${VERSION}-linux-aarch64.tar.gz.sha256"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: gludd-linux-aarch64
          path: |
            dist/gludd-${{ env.VERSION }}-linux-aarch64.tar.gz
            dist/gludd-${{ env.VERSION }}-linux-aarch64.tar.gz.sha256

  release:
    needs: [version, gate, linux, macos, windows, termux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: artifacts
          pattern: gludd-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts/
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          draft: false
          prerelease: true
          files: artifacts/*
          generate_release_notes: true
