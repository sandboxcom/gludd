name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: echo "version=v0.1.0-alpha-$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

  linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      # actions/checkout@v4.1.7
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      # astral-sh/setup-uv@v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Build executable
        run: |
          uv sync
          uv run pyinstaller gludd.spec --clean --noconfirm
      - name: Package tarball
        run: |
          mkdir -p dist/release
          cp dist/gludd dist/release/gludd
          cp -r config dist/release/config
          cp -r templates dist/release/templates
          cp -r playbooks dist/release/playbooks
          cd dist/release
          tar czf "../gludd-${VERSION}-linux-x86_64.tar.gz" .
          sha256sum "../gludd-${VERSION}-linux-x86_64.tar.gz" > "../gludd-${VERSION}-linux-x86_64.tar.gz.sha256"
      # actions/upload-artifact@v4.4.3
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: gludd-linux-x86_64
          path: |
            dist/gludd-${{ env.VERSION }}-linux-x86_64.tar.gz
            dist/gludd-${{ env.VERSION }}-linux-x86_64.tar.gz.sha256

  macos:
    needs: version
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      # actions/checkout@v4.1.7
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      # astral-sh/setup-uv@v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Build executable
        run: |
          uv sync
          uv run pyinstaller gludd.spec --clean --noconfirm
      - name: Package tarball
        run: |
          mkdir -p dist/release
          cp dist/gludd dist/release/gludd
          cp -r config dist/release/config
          cp -r templates dist/release/templates
          cp -r playbooks dist/release/playbooks
          cd dist/release
          tar czf "../gludd-${VERSION}-macos-arm64.tar.gz" .
          shasum -a 256 "../gludd-${VERSION}-macos-arm64.tar.gz" > "../gludd-${VERSION}-macos-arm64.tar.gz.sha256"
      # actions/upload-artifact@v4.4.3
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: gludd-macos-arm64
          path: |
            dist/gludd-${{ env.VERSION }}-macos-arm64.tar.gz
            dist/gludd-${{ env.VERSION }}-macos-arm64.tar.gz.sha256

  windows:
    needs: version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      # actions/checkout@v4.1.7
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      # astral-sh/setup-uv@v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Build executable
        run: |
          uv sync
          uv run pyinstaller gludd.spec --clean --noconfirm
      - name: Package zip
        shell: pwsh
        run: |
          mkdir -p dist/release
          Copy-Item dist/gludd.exe dist/release/gludd.exe
          Copy-Item -r config dist/release/config
          Copy-Item -r templates dist/release/templates
          Copy-Item -r playbooks dist/release/playbooks
          Compress-Archive -Path dist/release/* -DestinationPath "dist/gludd-$env:VERSION-windows-x86_64.zip"
          certutil -hashfile "dist/gludd-$env:VERSION-windows-x86_64.zip" SHA256 > "dist/gludd-$env:VERSION-windows-x86_64.zip.sha256"
      # actions/upload-artifact@v4.4.3
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: gludd-windows-x86_64
          path: |
            dist/gludd-${{ env.VERSION }}-windows-x86_64.zip
            dist/gludd-${{ env.VERSION }}-windows-x86_64.zip.sha256

  termux:
    needs: version
    runs-on: ubuntu-24.04-arm
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      # actions/checkout@v4.1.7
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      # astral-sh/setup-uv@v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Build executable
        run: |
          uv sync
          uv run pyinstaller gludd.spec --clean --noconfirm
      - name: Package tarball
        run: |
          mkdir -p dist/release
          cp dist/gludd dist/release/gludd
          cp -r config dist/release/config
          cp -r templates dist/release/templates
          cp -r playbooks dist/release/playbooks
          cd dist/release
          tar czf "../gludd-${VERSION}-linux-aarch64.tar.gz" .
          sha256sum "../gludd-${VERSION}-linux-aarch64.tar.gz" > "../gludd-${VERSION}-linux-aarch64.tar.gz.sha256"
      # actions/upload-artifact@v4.4.3
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: gludd-linux-aarch64
          path: |
            dist/gludd-${{ env.VERSION }}-linux-aarch64.tar.gz
            dist/gludd-${{ env.VERSION }}-linux-aarch64.tar.gz.sha256
