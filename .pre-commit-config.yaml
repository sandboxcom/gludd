repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
        exclude: 'tests/.*'
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: >
          (?x)^(
            uv.lock|
            .secrets.baseline|
            dist/.*|
            \.venv/.*|
            \.opencode/node_modules/.*|
            \.mypy_cache/.*|
            \.pytest_cache/.*|
            \.ruff_cache/.*|
            __pycache__/.*
          )$

  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: collect-check
        name: test collection check
        entry: uv run python -m pytest tests/ --co -q
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
