tasks:
  - name: implement_feature
    description: "Implement the core feature"
    target_agent: build
    dependencies: []
    acceptance_criteria:
      - "All unit tests pass"
      - "Code reviewed"

  - name: write_tests
    description: "Write tests for the feature"
    target_agent: build
    work_type: test
    dependencies: [implement_feature]
    acceptance_criteria:
      - "Test coverage above 80%"
