---
# gludd_git runs REAL git locally via GitAutomation. Prepare creates a throwaway
# git repo with an initial commit so the module has a real repo to operate on.
# The mock daemon is also started (required by coverage policy) even though
# gludd_git does not call the daemon HTTP API.
- name: Prepare - throwaway git repo + mock daemon
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
    mock_port: "{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8779', true) }}"
    pidfile: "/tmp/gludd-mock-{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8779', true) }}.pid"
    repo_path: "/tmp/gludd-git-repo-{{ mock_port }}"

  tasks:
    - name: Launch mock daemon (background, nohup)
      ansible.builtin.shell:
        cmd: >-
          nohup {{ lookup('env', 'VIRTUAL_ENV') | default('/usr', true) }}/bin/python3
          "{{ project_dir }}/molecule/mock_daemon/server.py"
          --port {{ mock_port }} --host 127.0.0.1 --pidfile "{{ pidfile }}"
          > /tmp/gludd-mock-{{ mock_port }}.log 2>&1 &
      changed_when: true

    - name: Wait for mock daemon /healthz
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ mock_port }}/healthz"
        method: GET
        status_code: 200
      register: health
      until: health.status == 200
      retries: 20
      delay: 0.5

    - name: Remove any stale throwaway git repo
      ansible.builtin.file:
        path: "{{ repo_path }}"
        state: absent

    - name: Create throwaway git repo with an initial commit
      ansible.builtin.shell:
        cmd: |
          set -e
          mkdir -p "{{ repo_path }}"
          cd "{{ repo_path }}"
          git init -q
          git config user.email "mock@molecule.local"
          git config user.name "Molecule Mock"
          git config commit.gpgsign false
          echo "seed" > README.md
          git add README.md
          git commit -q -m "seed commit"
      changed_when: true
