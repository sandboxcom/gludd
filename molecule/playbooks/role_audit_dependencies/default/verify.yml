---
- name: Verify - audit_dependencies wrote its report artifacts
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    mock_port: "{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8786', true) }}"
    pidfile: "/tmp/gludd-mock-{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8786', true) }}.pid"
    artifact: "/tmp/gludd-audit-dependencies-{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8786', true) }}/audit_dependencies_report.json"
    artifact_md: "/tmp/gludd-audit-dependencies-{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8786', true) }}/audit_dependencies_report.md"
  tasks:
    - name: Assert JSON artifact exists
      ansible.builtin.stat:
        path: "{{ artifact }}"
      register: art
      failed_when: not art.stat.exists

    - name: Load JSON artifact
      ansible.builtin.slurp:
        src: "{{ artifact }}"
      register: art_raw

    - name: Parse JSON artifact
      ansible.builtin.set_fact:
        result: "{{ art_raw.content | b64decode | from_json }}"

    - name: Assert artifact fields
      ansible.builtin.assert:
        that:
          - result.role == 'audit_dependencies'
          - result.status == 'completed'
          - result.dep_scan_path is defined
          - result.dep_ecosystem is defined
          - result.facts_snapshot is defined
          - result.report is defined
          - result.report | length > 0
        fail_msg: "audit_dependencies artifact wrong: {{ result }}"
        success_msg: "audit_dependencies ran end-to-end against mock; ecosystem={{ result.dep_ecosystem }}"

    - name: Assert markdown artifact exists
      ansible.builtin.stat:
        path: "{{ artifact_md }}"
      register: art_md
      failed_when: not art_md.stat.exists

    - name: Stop mock daemon
      ansible.builtin.shell:
        cmd: "kill $(cat {{ pidfile }}) 2>/dev/null || true; rm -f {{ pidfile }}"
      changed_when: false
      failed_when: false

    - name: Remove artifact dir
      ansible.builtin.file:
        path: "/tmp/gludd-audit-dependencies-{{ mock_port }}"
        state: absent
      failed_when: false
