---
driver:
  name: default
platforms: []
provisioner:
  name: ansible
  env:
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_PROJECT_DIRECTORY}/collections"
    GLUDD_MOCK_PORT: "8773"
  playbooks:
    prepare: default/prepare.yml
    converge: default/converge.yml
    verify: default/verify.yml
verifier:
  name: ansible
scenario:
  # implement_change is intentionally NON-idempotent: each run creates a fresh
  # auto/implement/<todo> branch + commit. Drop the idempotence step (re-running
  # converge would fail on "branch already exists") — that is by design, not a bug.
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - side_effect
    - verify
    - cleanup
    - destroy
