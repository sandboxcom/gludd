---
- name: Converge - run dependency_update role
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    mock_port: "{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8792', true) }}"
  tasks:
    - name: Invoke dependency_update (analysis only; apply_updates=false)
      ansible.builtin.include_role:
        name: general_ludd.agent.dependency_update
      vars:
        daemon_url: "http://127.0.0.1:{{ mock_port }}"
        psk: ""
        dep_ecosystem: "python"
        dep_package: "requests"
        apply_updates: false
        artifact_dir: "/tmp/gludd-dependency-update-{{ mock_port }}"
