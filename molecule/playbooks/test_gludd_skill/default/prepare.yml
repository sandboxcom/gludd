---
# gludd_skill does not call the daemon — it reads local skill .md files and
# renders them with Jinja2. Prepare creates a throwaway skills directory with
# a test skill so the real module logic (discover_skills + render_skill) runs.
# The mock daemon is also started (required by the test_module_scenarios_start_the_mock_daemon
# coverage check) and can serve as a sentinel for readiness.
- name: Prepare - create throwaway skills directory + start mock daemon
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
    mock_port: "{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8777', true) }}"
    pidfile: "/tmp/gludd-mock-{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8777', true) }}.pid"
    skills_dir: "/tmp/gludd-mock-skills-{{ mock_port }}"

  tasks:
    - name: Launch mock daemon (background, nohup)
      ansible.builtin.shell:
        cmd: >-
          nohup {{ lookup('env', 'VIRTUAL_ENV') | default('/usr', true) }}/bin/python3
          "{{ project_dir }}/molecule/mock_daemon/server.py"
          --port {{ mock_port }} --host 127.0.0.1 --pidfile "{{ pidfile }}"
          > /tmp/gludd-mock-{{ mock_port }}.log 2>&1 &
      changed_when: true

    - name: Wait for mock daemon /healthz
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ mock_port }}/healthz"
        method: GET
        status_code: 200
      register: health
      until: health.status == 200
      retries: 20
      delay: 0.5

    - name: Create throwaway skills directory
      ansible.builtin.file:
        path: "{{ skills_dir }}"
        state: directory
        mode: "0755"

    - name: Write a test skill markdown file
      # Use {% raw %} to prevent Ansible from evaluating the Jinja2 variables
      # inside the skill body (those are for gludd_skill to render, not Ansible).
      ansible.builtin.copy:
        dest: "{{ skills_dir }}/mock-review.md"
        mode: "0644"
        content: "---\nname: mock-review\ndescription: A mock code-review skill for molecule testing\ntrigger_patterns:\n  - \"code.?review\"\ntags:\n  - review\n  - test\n---\nReview the following {% raw %}{{ language }}{% endraw %} code in project {% raw %}{{ project_name }}{% endraw %}:\n\nFocus on correctness and clarity.\n"
