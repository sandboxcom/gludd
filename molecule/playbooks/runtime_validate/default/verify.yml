---
- name: Verify runtime validation results
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_src: "{{ lookup('env', 'PWD') }}/src"
    venv_python: "{{ lookup('env', 'VIRTUAL_ENV') | default('/usr', true) }}/bin/python3"
    files_dir: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') | default(playbook_dir, true) }}"
  tasks:
    - name: Re-run runtime component checks (verify pass)
      ansible.builtin.command:
        cmd: "{{ venv_python }} {{ files_dir }}/default/files/check_runtime.py {{ project_src }} {{ lookup('env', 'PWD') }}"
      register: runtime_check
      changed_when: false

    - name: Assert all runtime components validated
      ansible.builtin.assert:
        that:
          - runtime_check.rc == 0
          - "'WORKER OK' in runtime_check.stdout"
          - "'EVENT_LOOP OK' in runtime_check.stdout"
          - "'RUNNER OK' in runtime_check.stdout"
          - "'CORE_RUNNER OK' in runtime_check.stdout"
          - "'GUNICORN OK' in runtime_check.stdout"
          - "'ALL_RUNTIME_CHECKS OK' in runtime_check.stdout"
        fail_msg: "Runtime validation failed: {{ runtime_check.stdout }}"
        success_msg: "All runtime components validated (worker/loop/runner/core/gunicorn)"
