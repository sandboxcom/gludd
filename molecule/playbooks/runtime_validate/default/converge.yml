---
- name: Converge - validate runtime components (worker, gunicorn, ansible runner)
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    project_src: "{{ lookup('env', 'PWD') }}/src"
    venv_python: "{{ lookup('env', 'VIRTUAL_ENV') | default('/usr', true) }}/bin/python3"
    files_dir: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') | default(playbook_dir, true) }}"
  tasks:
    - name: Run runtime component checks
      ansible.builtin.command:
        cmd: "{{ venv_python }} {{ files_dir }}/default/files/check_runtime.py {{ project_src }} {{ lookup('env', 'PWD') }}"
      register: runtime_check
      changed_when: false
      failed_when: runtime_check.rc != 0

    - name: Show runtime check output
      ansible.builtin.debug:
        var: runtime_check.stdout_lines
