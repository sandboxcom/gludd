---
# gludd_mcp_tool is honestly fenced (W3.9): it never hits the daemon and always
# returns not_implemented=true. The mock daemon is started per coverage policy
# (test_module_scenarios_start_the_mock_daemon asserts prepare.yml references
# mock_daemon/server.py), though this module does not call it.
- name: Prepare - start mock daemon (required by coverage policy)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
    mock_port: "{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8778', true) }}"
    pidfile: "/tmp/gludd-mock-{{ lookup('env', 'GLUDD_MOCK_PORT') | default('8778', true) }}.pid"
  tasks:
    - name: Launch mock daemon (background, nohup)
      ansible.builtin.shell:
        cmd: >-
          nohup {{ lookup('env', 'VIRTUAL_ENV') | default('/usr', true) }}/bin/python3
          "{{ project_dir }}/molecule/mock_daemon/server.py"
          --port {{ mock_port }} --host 127.0.0.1 --pidfile "{{ pidfile }}"
          > /tmp/gludd-mock-{{ mock_port }}.log 2>&1 &
      changed_when: true

    - name: Wait for mock daemon /healthz
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ mock_port }}/healthz"
        method: GET
        status_code: 200
      register: health
      until: health.status == 200
      retries: 20
      delay: 0.5
