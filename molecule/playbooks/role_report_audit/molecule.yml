---
driver:
  name: default
platforms: []
provisioner:
  name: ansible
  env:
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_PROJECT_DIRECTORY}/collections"
    GLUDD_MOCK_PORT: "8784"
  playbooks:
    prepare: default/prepare.yml
    converge: default/converge.yml
    verify: default/verify.yml
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - side_effect
    - verify
    - cleanup
    - destroy
