---
galaxy_info:
  role_name: report_status
  author: Agentic Harness Agent
  description: >
    Renders a status report FROM gludd_facts: work/todo/model/history/message
    stats. Classifies system health (healthy/degraded/critical) based on live
    success rate. The concrete proof that Ansible YAML logic branches on facts.
    NEVER mutates the repo.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: [all]
    - name: Ubuntu
      versions: [all]
    - name: MacOSX
      versions: [all]
dependencies: []
