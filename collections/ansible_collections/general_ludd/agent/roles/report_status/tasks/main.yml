---
# report_status role — render a status report FROM gludd_facts
#
# "What's the state of the system?" — work/todo/model/history/message stats.
# This is the concrete proof that "logic in the Ansible YAML decides what to do
# next" using live facts. The YAML branches on backlog, success rate, model health.
#
# REPORT-ONLY: never mutates the repo.

- name: Gather live daemon facts for status report
  general_ludd.agent.gludd_facts:
    daemon_url: "{{ daemon_url }}"
    psk: "{{ psk }}"
  register: live_facts
  no_log: "{{ psk | length > 0 }}"

- name: Create artifact directory
  ansible.builtin.file:
    path: "{{ artifact_dir }}"
    state: directory
    mode: "0755"

# ── Branch on live facts — Ansible logic deciding next action ──────────────

- name: Set system health classification based on live facts
  ansible.builtin.set_fact:
    _rs_success_rate: "{{ live_facts.ansible_facts.gludd.history.success_rate | default(0) | float }}"
    _rs_backlog: "{{ live_facts.ansible_facts.gludd.todos.backlog_size | default(0) | int }}"
    _rs_unread: "{{ live_facts.ansible_facts.gludd.messages.total_unread | default(0) | int }}"
    _rs_total_work: "{{ live_facts.ansible_facts.gludd.work.total | default(0) | int }}"

- name: Classify system health (critical — success rate below 50%)
  ansible.builtin.set_fact:
    _rs_health_status: "critical"
    _rs_health_reason: "Success rate {{ _rs_success_rate }}% below 50% threshold"
  when: _rs_success_rate | float < 50.0

- name: Classify system health (degraded — success rate 50-80%)
  ansible.builtin.set_fact:
    _rs_health_status: "degraded"
    _rs_health_reason: "Success rate {{ _rs_success_rate }}% is in degraded range (50-80%)"
  when:
    - _rs_success_rate | float >= 50.0
    - _rs_success_rate | float < 80.0

- name: Classify system health (healthy)
  ansible.builtin.set_fact:
    _rs_health_status: "healthy"
    _rs_health_reason: "Success rate {{ _rs_success_rate }}% above 80% threshold"
  when: _rs_success_rate | float >= 80.0

- name: Set health status default (no history)
  ansible.builtin.set_fact:
    _rs_health_status: "unknown"
    _rs_health_reason: "No history data available yet"
  when: _rs_health_status is not defined

- name: Write JSON status report artifact
  ansible.builtin.copy:
    content: >-
      {{ {
        'role': 'report_status',
        'status': 'completed',
        'system_health': _rs_health_status,
        'health_reason': _rs_health_reason,
        'work': live_facts.ansible_facts.gludd.work | default({}),
        'todos': live_facts.ansible_facts.gludd.todos | default({}),
        'models': live_facts.ansible_facts.gludd.models | default({}),
        'history': live_facts.ansible_facts.gludd.history | default({}),
        'messages': live_facts.ansible_facts.gludd.messages | default({})
      } | to_nice_json }}
    dest: "{{ artifact_dir }}/report_status.json"
    mode: "0644"

- name: Write markdown status report
  ansible.builtin.copy:
    content: |
      # System Status Report

      **Health:** {{ _rs_health_status | upper }}
      **Reason:** {{ _rs_health_reason }}

      ## Work Queue

      - Total work items: {{ live_facts.ansible_facts.gludd.work.total | default(0) }}
      - In progress: {{ live_facts.ansible_facts.gludd.work.in_progress | default(0) }}

      ## Todos

      - Backlog: {{ live_facts.ansible_facts.gludd.todos.backlog_size | default(0) }}
      - Total: {{ live_facts.ansible_facts.gludd.todos.total | default(0) }}
      - Done: {{ live_facts.ansible_facts.gludd.todos.done | default(0) }}

      ## Models

      - Active models: {{ live_facts.ansible_facts.gludd.models.active_count | default(0) }}
      - Usage (tokens): {{ live_facts.ansible_facts.gludd.models.total_tokens | default(0) }}

      ## History

      - Total runs: {{ live_facts.ansible_facts.gludd.history.total_runs | default(0) }}
      - Success rate: {{ live_facts.ansible_facts.gludd.history.success_rate | default('N/A') }}%

      ## Messages

      - Unread: {{ live_facts.ansible_facts.gludd.messages.total_unread | default(0) }}

      ---
      *Generated by general_ludd.agent.report_status — report-only, no repo mutations.*
    dest: "{{ artifact_dir }}/report_status.md"
    mode: "0644"

- name: Warn when system health is critical
  ansible.builtin.debug:
    msg: "WARNING: System health is CRITICAL — {{ _rs_health_reason }}"
  when: _rs_health_status == 'critical'

- name: Report status completion
  ansible.builtin.debug:
    msg: "Status report written to {{ artifact_dir }}/report_status.json (health={{ _rs_health_status }})"
