    structured analysis. Wires into the existing DependencyManager patterns.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: [all]
    - name: Ubuntu
      versions: [all]
    - name: MacOSX
      versions: [all]
dependencies: []
