---
# audit_security role — security scan oriented audit (report-only)
#
# Uses bandit / secret-scan patterns via model analysis. NEVER mutates the repo.
#
# Flow:
#   1. Gather live facts (gludd_facts) for system context
#   2. Run model agent to analyze security posture
#   3. Write structured JSON + markdown report artifact
#
# SECURITY: This role NEVER:
#   - Commits to git (no git module use)
#   - Updates todos (no todo status changes)
#   - Pushes to any remote
#   - Runs shell: with templated user input

- name: Gather live daemon facts for audit context
  general_ludd.agent.gludd_facts:
    daemon_url: "{{ daemon_url }}"
    psk: "{{ psk }}"
  register: live_facts
  no_log: "{{ psk | length > 0 }}"

- name: Create artifact directory
  ansible.builtin.file:
    path: "{{ artifact_dir }}"
    state: directory
    mode: "0755"

# ---- audit lifecycle (report-only — no rescue block needed for cleanup) ----
- name: Run model agent for security analysis
  general_ludd.agent.gludd_agent_run:
    prompt: >-
      Perform a security audit of the codebase at {{ scan_target }}.

      Focus areas:
      {% for area in security_focus_areas %}
      - {{ area }}
      {% endfor %}

      Check for:
      1. Hardcoded secrets, API keys, tokens (look for patterns like key=, token=, password=)
      2. Injection vulnerabilities (SQL, command injection via templated strings)
      3. Path traversal risks
      4. Authentication/authorization gaps
      5. Insecure deserialization
      6. Known CVE patterns for packages listed in requirements

      System context:
      - Work backlog: {{ live_facts.ansible_facts.gludd.todos.backlog_size | default(0) }} items
      - Recent success rate: {{ live_facts.ansible_facts.gludd.history.success_rate | default('unknown') }}

      Produce a structured JSON report with:
      {
        "severity_counts": {"critical": N, "high": N, "medium": N, "low": N},
        "findings": [{"severity": "...", "file": "...", "line": N, "description": "...", "remediation": "..."}],
        "summary": "..."
      }
    model_profile: "{{ model_profile | default('') }}"
    max_iterations: 8
    daemon_url: "{{ daemon_url }}"
    psk: "{{ psk }}"
  register: agent_run
  no_log: "{{ psk | length > 0 }}"
  when: not ansible_check_mode

- name: Write JSON security audit report
  ansible.builtin.copy:
    content: >-
      {{ {
        'role': 'audit_security',
        'scan_target': scan_target,
        'security_focus_areas': security_focus_areas,
        'status': 'completed',
        'report': (agent_run.answer | default('{}'))[:4000],
        'facts_snapshot': {
          'backlog_size': live_facts.ansible_facts.gludd.todos.backlog_size | default(0),
          'unread_messages': live_facts.ansible_facts.gludd.messages.total_unread | default(0)
        }
      } | to_nice_json }}
    dest: "{{ artifact_dir }}/audit_security_report.json"
    mode: "0644"

- name: Write markdown security audit report
  ansible.builtin.copy:
    content: |
      # Security Audit Report

      **Target:** {{ scan_target }}
      **Date:** {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') | default('unknown') }}
      **Focus:** {{ security_focus_areas | join(', ') }}

      ## System Context

      - Work backlog: {{ live_facts.ansible_facts.gludd.todos.backlog_size | default(0) }} items
      - Recent model success rate: {{ live_facts.ansible_facts.gludd.history.success_rate | default('N/A') }}

      ## Findings

      {{ agent_run.answer | default('No findings recorded.') }}

      ---
      *Generated by general_ludd.agent.audit_security — report-only, no repo mutations.*
    dest: "{{ artifact_dir }}/audit_security_report.md"
    mode: "0644"

- name: Report audit completion
  ansible.builtin.debug:
    msg: "Security audit complete. Report written to {{ artifact_dir }}/audit_security_report.json"
