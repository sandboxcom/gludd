---
# report_metrics role — model usage, success/failure rates, throughput from facts
#
# REPORT-ONLY: never mutates the repo.

- name: Gather live daemon facts for metrics report
  general_ludd.agent.gludd_facts:
    daemon_url: "{{ daemon_url }}"
    psk: "{{ psk }}"
  register: live_facts
  no_log: "{{ psk | length > 0 }}"

- name: Create artifact directory
  ansible.builtin.file:
    path: "{{ artifact_dir }}"
    state: directory
    mode: "0755"

# ── Compute derived metrics from live facts ────────────────────────────────

- name: Set derived metrics from live facts
  ansible.builtin.set_fact:
    _rm_total_runs: "{{ live_facts.ansible_facts.gludd.history.total_runs | default(0) | int }}"
    _rm_success_rate: "{{ live_facts.ansible_facts.gludd.history.success_rate | default(0) | float }}"
    _rm_total_tokens: "{{ live_facts.ansible_facts.gludd.models.total_tokens | default(0) | int }}"
    _rm_active_models: "{{ live_facts.ansible_facts.gludd.models.active_count | default(0) | int }}"
    _rm_backlog: "{{ live_facts.ansible_facts.gludd.todos.backlog_size | default(0) | int }}"

- name: Classify throughput tier
  ansible.builtin.set_fact:
    _rm_throughput_tier: "high"
  when: _rm_total_runs | int > 100

- name: Classify throughput tier (medium)
  ansible.builtin.set_fact:
    _rm_throughput_tier: "medium"
  when:
    - _rm_total_runs | int >= 10
    - _rm_total_runs | int <= 100

- name: Classify throughput tier (low)
  ansible.builtin.set_fact:
    _rm_throughput_tier: "low"
  when: _rm_total_runs | int < 10

- name: Write JSON metrics report
  ansible.builtin.copy:
    content: >-
      {{ {
        'role': 'report_metrics',
        'status': 'completed',
        'throughput_tier': _rm_throughput_tier | default('unknown'),
        'model_usage': {
          'active_models': _rm_active_models | int,
          'total_tokens': _rm_total_tokens | int,
          'model_details': live_facts.ansible_facts.gludd.models | default({})
        },
        'success_failure': {
          'total_runs': _rm_total_runs | int,
          'success_rate_pct': _rm_success_rate | float,
          'failure_rate_pct': (100 - (_rm_success_rate | float)),
          'recent_failures': live_facts.ansible_facts.gludd.history.recent_failures | default(0)
        },
        'queue_metrics': {
          'backlog_size': _rm_backlog | int,
          'in_progress': live_facts.ansible_facts.gludd.work.in_progress | default(0),
          'total_messages': live_facts.ansible_facts.gludd.messages.total_unread | default(0)
        }
      } | to_nice_json }}
    dest: "{{ artifact_dir }}/report_metrics.json"
    mode: "0644"

- name: Write markdown metrics report
  ansible.builtin.copy:
    content: |
      # Metrics Report

      **Throughput Tier:** {{ _rm_throughput_tier | default('unknown') | upper }}

      ## Model Usage

      - Active models: {{ _rm_active_models }}
      - Total tokens consumed: {{ _rm_total_tokens }}

      ## Success / Failure Rates

      - Total runs: {{ _rm_total_runs }}
      - Success rate: {{ _rm_success_rate }}%
      - Failure rate: {{ (100 - (_rm_success_rate | float)) | round(1) }}%
      - Recent failures: {{ live_facts.ansible_facts.gludd.history.recent_failures | default(0) }}

      ## Queue Metrics

      - Backlog size: {{ _rm_backlog }}
      - In progress: {{ live_facts.ansible_facts.gludd.work.in_progress | default(0) }}
      - Unread messages: {{ live_facts.ansible_facts.gludd.messages.total_unread | default(0) }}

      ---
      *Generated by general_ludd.agent.report_metrics — report-only.*
    dest: "{{ artifact_dir }}/report_metrics.md"
    mode: "0644"

- name: Report metrics completion
  ansible.builtin.debug:
    msg: "Metrics report written to {{ artifact_dir }}/report_metrics.json (throughput={{ _rm_throughput_tier | default('unknown') }})"
