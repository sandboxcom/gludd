---
# report_audit role — consolidates audit role outputs into one report artifact
#
# Reads the output artifacts from audit_security and audit_dependencies
# (or whatever audit_sources_dir they wrote to) and produces a consolidated
# report. Also gathers live facts for freshness context.
#
# REPORT-ONLY: never mutates the repo.

- name: Gather live daemon facts for consolidated audit report
  general_ludd.agent.gludd_facts:
    daemon_url: "{{ daemon_url }}"
    psk: "{{ psk }}"
  register: live_facts
  no_log: "{{ psk | length > 0 }}"

- name: Create artifact directory
  ansible.builtin.file:
    path: "{{ artifact_dir }}"
    state: directory
    mode: "0755"

# ── Gather audit sub-reports ───────────────────────────────────────────────

- name: Read security audit report (if present)
  ansible.builtin.slurp:
    src: "{{ audit_security_artifact }}"
  register: security_report_raw
  failed_when: false
  when: audit_security_artifact | length > 0

- name: Read dependency audit report (if present)
  ansible.builtin.slurp:
    src: "{{ audit_dependencies_artifact }}"
  register: dep_report_raw
  failed_when: false
  when: audit_dependencies_artifact | length > 0

- name: Parse security audit report
  ansible.builtin.set_fact:
    _ra_security: "{{ (security_report_raw.content | b64decode | from_json) if (security_report_raw is defined and security_report_raw.content is defined) else {} }}"

- name: Parse dependency audit report
  ansible.builtin.set_fact:
    _ra_deps: "{{ (dep_report_raw.content | b64decode | from_json) if (dep_report_raw is defined and dep_report_raw.content is defined) else {} }}"

# ── Branch on audit findings ───────────────────────────────────────────────

- name: Set consolidated audit status (no sub-reports)
  ansible.builtin.set_fact:
    _ra_status: "no_data"
    _ra_summary: "No audit sub-reports found. Run audit_security and audit_dependencies first."
  when:
    - _ra_security == {}
    - _ra_deps == {}

- name: Set consolidated audit status (has data)
  ansible.builtin.set_fact:
    _ra_status: "consolidated"
    _ra_summary: "Consolidated {{ [_ra_security, _ra_deps] | select | list | length }} audit report(s)."
  when: _ra_security != {} or _ra_deps != {}

- name: Write consolidated JSON audit report
  ansible.builtin.copy:
    content: >-
      {{ {
        'role': 'report_audit',
        'status': _ra_status,
        'summary': _ra_summary,
        'security_audit': _ra_security,
        'dependency_audit': _ra_deps,
        'system_snapshot': {
          'backlog_size': live_facts.ansible_facts.gludd.todos.backlog_size | default(0),
          'success_rate': live_facts.ansible_facts.gludd.history.success_rate | default(0),
          'unread_messages': live_facts.ansible_facts.gludd.messages.total_unread | default(0)
        }
      } | to_nice_json }}
    dest: "{{ artifact_dir }}/report_audit.json"
    mode: "0644"

- name: Write consolidated markdown audit report
  ansible.builtin.copy:
    content: |
      # Consolidated Audit Report

      **Status:** {{ _ra_status }}
      **Summary:** {{ _ra_summary }}

      ## System Snapshot

      - Backlog: {{ live_facts.ansible_facts.gludd.todos.backlog_size | default(0) }} items
      - Success rate: {{ live_facts.ansible_facts.gludd.history.success_rate | default('N/A') }}%
      - Unread messages: {{ live_facts.ansible_facts.gludd.messages.total_unread | default(0) }}

      ## Security Findings

      {% if _ra_security != {} %}
      {{ _ra_security.report | default('(see JSON)') | truncate(500) }}
      {% else %}
      *No security audit data. Run audit_security role first.*
      {% endif %}

      ## Dependency Findings

      {% if _ra_deps != {} %}
      {{ _ra_deps.report | default('(see JSON)') | truncate(500) }}
      {% else %}
      *No dependency audit data. Run audit_dependencies role first.*
      {% endif %}

      ---
      *Generated by general_ludd.agent.report_audit — consolidation only, no repo mutations.*
    dest: "{{ artifact_dir }}/report_audit.md"
    mode: "0644"

- name: Report audit consolidation completion
  ansible.builtin.debug:
    msg: "Audit report consolidated: {{ _ra_summary }}"
