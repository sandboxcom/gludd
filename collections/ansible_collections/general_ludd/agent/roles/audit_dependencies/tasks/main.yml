---
# audit_dependencies role — outdated/vulnerable deps audit (report-only)
#
# NEVER mutates the repo. Never commits. Never pushes.
#
# Flow:
#   1. Gather live facts (gludd_facts)
#   2. Run model agent to analyze dependency health
#   3. Write JSON + markdown report artifact

- name: Gather live daemon facts for audit context
  general_ludd.agent.gludd_facts:
    daemon_url: "{{ daemon_url }}"
    psk: "{{ psk }}"
  register: live_facts
  no_log: "{{ psk | length > 0 }}"

- name: Create artifact directory
  ansible.builtin.file:
    path: "{{ artifact_dir }}"
    state: directory
    mode: "0755"

- name: Run model agent for dependency audit
  general_ludd.agent.gludd_agent_run:
    prompt: >-
      Audit the dependencies in {{ dep_scan_path }} for health issues.

      Ecosystem: {{ dep_ecosystem }}
      Check: outdated packages, known CVEs, license compliance.

      System context:
      - Backlog: {{ live_facts.ansible_facts.gludd.todos.backlog_size | default(0) }} items
      - Model success rate: {{ live_facts.ansible_facts.gludd.history.success_rate | default('unknown') }}

      Produce a structured JSON report:
      {
        "total_deps": N,
        "outdated": [{"name": "...", "current": "...", "latest": "...", "risk": "low/medium/high"}],
        "vulnerable": [{"name": "...", "cve": "...", "severity": "..."}],
        "summary": "..."
      }
    model_profile: "{{ model_profile | default('') }}"
    max_iterations: 6
    daemon_url: "{{ daemon_url }}"
    psk: "{{ psk }}"
  register: agent_run
  no_log: "{{ psk | length > 0 }}"
  when: not ansible_check_mode

- name: Write JSON dependency audit report
  ansible.builtin.copy:
    content: >-
      {{ {
        'role': 'audit_dependencies',
        'dep_scan_path': dep_scan_path,
        'dep_ecosystem': dep_ecosystem,
        'status': 'completed',
        'report': (agent_run.answer | default('{}'))[:4000],
        'facts_snapshot': {
          'backlog_size': live_facts.ansible_facts.gludd.todos.backlog_size | default(0),
          'success_rate': live_facts.ansible_facts.gludd.history.success_rate | default(0)
        }
      } | to_nice_json }}
    dest: "{{ artifact_dir }}/audit_dependencies_report.json"
    mode: "0644"

- name: Write markdown dependency audit report
  ansible.builtin.copy:
    content: |
      # Dependency Audit Report

      **Path:** {{ dep_scan_path }}
      **Ecosystem:** {{ dep_ecosystem }}

      ## System Context

      - Work backlog: {{ live_facts.ansible_facts.gludd.todos.backlog_size | default(0) }} items
      - Model success rate: {{ live_facts.ansible_facts.gludd.history.success_rate | default('N/A') }}

      ## Analysis

      {{ agent_run.answer | default('No findings recorded.') }}

      ---
      *Generated by general_ludd.agent.audit_dependencies — report-only.*
    dest: "{{ artifact_dir }}/audit_dependencies_report.md"
    mode: "0644"

- name: Report audit completion
  ansible.builtin.debug:
    msg: "Dependency audit complete. Report written to {{ artifact_dir }}/audit_dependencies_report.json"
