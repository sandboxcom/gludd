[defaults]
# Collection search path — includes the local collections/ directory
# so general_ludd.agent.* modules resolve without installation.
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# Roles search path
roles_path = ./roles:~/.ansible/roles:/usr/share/ansible/roles

# Disable host key checking for local connections
host_key_checking = False

# Suppress deprecation warnings that clutter playbook output
deprecation_warnings = False
