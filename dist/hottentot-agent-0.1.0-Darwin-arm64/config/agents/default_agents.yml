agents:
  - name: build
    description: "Primary build agent with all tool permissions"
    type: primary
    model_profile: null
    prompt_profile: null
    max_steps: 10
    permissions:
      can_edit: true
      can_bash: true
      can_read: true
      can_dispatch_subagents: true
      allowed_subagents:
        - "*"
    max_concurrent: 1
    enabled: true

  - name: plan
    description: "Primary planning agent with read-only access"
    type: primary
    model_profile: null
    prompt_profile: null
    max_steps: 10
    permissions:
      can_edit: false
      can_bash: false
      can_read: true
      can_dispatch_subagents: true
      allowed_subagents:
        - "explore"
    max_concurrent: 1
    enabled: true

  - name: explore
    description: "Subagent for codebase exploration, read-only"
    type: subagent
    model_profile: null
    prompt_profile: null
    max_steps: 10
    permissions:
      can_edit: false
      can_bash: false
      can_read: true
      can_dispatch_subagents: false
      allowed_subagents: []
    max_concurrent: 5
    enabled: true

  - name: general
    description: "General-purpose subagent with all tool permissions"
    type: subagent
    model_profile: null
    prompt_profile: null
    max_steps: 10
    permissions:
      can_edit: true
      can_bash: true
      can_read: true
      can_dispatch_subagents: false
      allowed_subagents: []
    max_concurrent: 3
    enabled: true
