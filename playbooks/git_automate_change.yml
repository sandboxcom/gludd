---
- name: Automate git change for agentic harness
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_path: "{{ repo_path | default('.') }}"
    branch_name: "{{ branch_name | default('') }}"
    commit_message: "{{ commit_message | default('agent: automated change') }}"
    tag_name: "{{ tag_name | default('') }}"
    remote: "{{ remote | default('origin') }}"
    artifact_dir: "{{ artifact_dir | default('/tmp/harness-git-change') }}"

  tasks:
    - name: Create artifact directory
      ansible.builtin.file:
        path: "{{ artifact_dir }}"
        state: directory
        mode: "0755"

    - name: Stage all changes
      ansible.builtin.command:
        cmd: git add -A
        chdir: "{{ repo_path }}"
      changed_when: true

    - name: Commit changes
      ansible.builtin.command:
        cmd: git commit -m "{{ commit_message }}"
        chdir: "{{ repo_path }}"
      register: commit_result
      changed_when: true

    - name: Write change result artifact
      ansible.builtin.copy:
        content: |
          {
            "repo_path": "{{ repo_path }}",
            "branch": "{{ branch_name }}",
            "playbook": "git_automate_change.yml",
            "status": "success",
            "commit_output": "{{ commit_result.stdout | default('') }}"
          }
        dest: "{{ artifact_dir }}/git_change_result.json"
        mode: "0644"
